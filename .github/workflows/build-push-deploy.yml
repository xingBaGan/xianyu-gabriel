name: Build Push Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  TENCENT_REGISTRY: hkccr.ccs.tencentyun.com
  TENCENT_NAMESPACE: xianyu-gabriel
  IMAGE_NAME: xianyu-auto-reply

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: vars
        run: |
          owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_REGISTRY}/${owner_lower}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ccr_image=${TENCENT_REGISTRY}/${TENCENT_NAMESPACE}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Tencent CCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-cn
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.ghcr_image }}:latest
            ${{ steps.vars.outputs.ghcr_image }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.ccr_image }}:latest
            ${{ steps.vars.outputs.ccr_image }}:${{ steps.vars.outputs.short_sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on server by SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ secrets.SERVER_DEPLOY_DIR }}
          REGISTRY: ${{ env.TENCENT_REGISTRY }}
          NAMESPACE: ${{ env.TENCENT_NAMESPACE }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CCR_USERNAME: ${{ secrets.TENCENT_USERNAME }}
          CCR_PASSWORD: ${{ secrets.TENCENT_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DEPLOY_DIR,REGISTRY,NAMESPACE,IMAGE_NAME,CCR_USERNAME,CCR_PASSWORD
          script: |
            set -e
            cd "$DEPLOY_DIR"
            git pull origin main
            echo "$CCR_PASSWORD" | docker login "$REGISTRY" -u "$CCR_USERNAME" --password-stdin
            export XIANYU_APP_IMAGE="$REGISTRY/$NAMESPACE/$IMAGE_NAME:latest"
            docker compose -f docker-compose-cn.yml pull xianyu-app
            docker compose -f docker-compose-cn.yml up -d --no-deps xianyu-app
            docker compose -f docker-compose-cn.yml up -d
